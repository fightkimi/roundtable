<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>圆桌研讨室</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">

      <!-- ── SIDEBAR ── -->
      <aside class="sidebar" aria-label="会话管理">
        <div class="sidebar-head">
          <div class="brand-lockup">
            <div class="brand-mark">RT</div>
            <div>
              <p class="eyebrow">Roundtable Seminar</p>
              <h1>圆桌研讨室</h1>
            </div>
          </div>
          <button id="newSessionBtn" class="new-session-btn" type="button">＋ 新建讨论</button>
        </div>
        <div id="savedSessionList" class="session-list" role="list"></div>
      </aside>

      <!-- ── CONVERSATION ── -->
      <main class="conversation">

        <header class="conv-header">
          <div class="conv-topic-wrap">
            <h2 id="sessionTitle" class="conv-topic">圆桌研讨室</h2>
            <div id="participantChips" class="participant-chips"></div>
          </div>
          <div class="header-actions">
            <button id="copyMarkdownBtn" class="ghost-btn" type="button">复制纪要</button>
            <button id="exportMarkdownBtn" class="ghost-btn" type="button">导出 MD</button>
          </div>
        </header>

        <div id="thread" class="thread" role="log" aria-live="polite" aria-label="研讨对话"></div>

        <footer class="command-bar">
          <div id="attachmentList" class="attachment-list-bar"></div>
          <form id="freeformForm" class="freeform-row">
            <label class="sr-only" for="freeformInput">追问</label>
            <textarea id="freeformInput" class="freeform-input" rows="1"
              placeholder="追问、质疑、或指定某位嘉宾继续展开…（Cmd+Enter 发送）"></textarea>
            <button id="sendFreeformBtn" class="send-btn" type="submit">发送</button>
          </form>
          <div class="quick-actions">
            <button id="continueBtn" class="act-btn act-primary" type="button">继续 →</button>
            <button id="deepenBtn" class="act-btn" type="button">深入此节</button>
            <button id="inviteBtn" class="act-btn" type="button">引入新人物</button>
            <button id="concludeBtn" class="act-btn act-dark" type="button">结论总结</button>
            <div class="acts-right">
              <button id="uploadAttachmentBtn" class="act-btn" type="button">附件上传</button>
              <input id="attachmentInput" class="sr-only" type="file" multiple
                accept=".txt,.md,.markdown,.html,.htm,.json,.csv,.log,.js,.jsx,.ts,.tsx,.css,.py" />
            </div>
          </div>
        </footer>

      </main>
    </div>

    <!-- New Session Modal -->
    <div id="newSessionModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="new-session-title">
        <div class="section-head row-head">
          <div>
            <span class="section-kicker">New Session</span>
            <h2 id="new-session-title">新建讨论</h2>
          </div>
          <button id="closeNewSessionBtn" class="icon-btn" type="button" aria-label="关闭">×</button>
        </div>
        <p class="modal-hint">输入你想探讨的议题，AI 会自动邀请最合适的思想席嘉宾</p>
        <label for="topicInput">议题</label>
        <textarea id="topicInput" rows="3">AI-Coding 协作治理如何从机制思考落成可运行的组织协作系统？</textarea>
        <div id="topicSuggestionList" class="topic-suggestion-list"></div>
        <div class="modal-footer">
          <button id="resetBtn" class="ghost-btn" type="button">重置</button>
          <button id="startBtn" class="primary-btn" type="button">开始研讨</button>
        </div>
      </div>
    </div>

    <!-- Add Person Modal -->
    <div id="personModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="section-head row-head">
          <div>
            <span class="section-kicker">New Seat</span>
            <h2 id="modal-title">引入新人物</h2>
          </div>
          <button id="closeModalBtn" class="icon-btn" type="button" aria-label="关闭">×</button>
        </div>
        <label for="personName">人物 / 席位</label>
        <input id="personName" type="text" value="组织学习负责人" />
        <label for="personAngle">关注角度</label>
        <select id="personAngle">
          <option>人才梯队与训练机制</option>
          <option>安全治理与权限边界</option>
          <option>产品体验与采用率</option>
          <option>工程质量与交付效率</option>
        </select>
        <button id="addPersonBtn" class="primary-btn wide-btn" type="button">加入圆桌</button>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
